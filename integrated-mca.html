<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Resources | DCA-Pedia</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="program-page">
    <header>
        <div class="container">
            <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">
                <i data-lucide="folder-search" class="logo-icon"></i>
                <h1>DCA<span>Pedia</span></h1>
            </a>
            <nav>
                <a href="https://github.com" target="_blank" class="github-link">
                    <i data-lucide="github"></i>
                </a>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-header">
            <div class="container">
                <a href="index.html" class="back-link">
                    <i data-lucide="chevron-left"></i> Back to Programs
                </a>
                <h2 id="program-title">Loading...</h2>
                <p id="program-desc">Please wait while we fetch the resources.</p>
            </div>
        </div>

        <div class="file-list-container">
            <div class="container">
                <div class="file-list" id="file-list">
                    <!-- Files will be injected here -->
                </div>
                <div id="no-files" style="display: none; text-align: center; padding: 3rem; color: var(--text-light);">
                    <i data-lucide="info" style="width: 48px; height: 48px; margin-bottom: 1rem;"></i>
                    <p>No PDFs found in this section yet.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 DCA-Pedia. Developed by <b>SFI DCA SUB COMMITTEE</b>. All resources are for educational purposes.</p>
        </div>
    </footer>

    <script src="data/pdfs.js"></script>
    <script>
        function renderFiles() {
            // Get program ID from the URL filename (e.g., mca.html -> mca)
            const path = window.location.pathname;
            const filename = path.split('/').pop().replace('.html', '');
            
            const program = pdfData[filename];
            
            if (!program) {
                document.getElementById('program-title').textContent = "Error";
                document.getElementById('program-desc').textContent = "Program not found.";
                return;
            }

            document.getElementById('program-title').textContent = program.title;
            document.getElementById('program-desc').textContent = program.description;
            document.title = `${program.title} | DCA-Pedia`;

            const fileList = document.getElementById('file-list');
            
            if (!program.files || program.files.length === 0) {
                fileList.style.display = 'none';
                document.getElementById('no-files').style.display = 'block';
                return;
            }

            fileList.innerHTML = program.files.map(file => `
                <a href="static/pdfs/${program.folder}/${file.name}" class="file-item" target="_blank">
                    <div class="file-icon">
                        <i data-lucide="file-text"></i>
                    </div>
                    <div class="file-info">
                        <span class="file-name">${file.name}</span>
                        <span class="file-meta">${file.size} • Uploaded on ${file.date}</span>
                    </div>
                    <div class="download-icon">
                        <i data-lucide="download"></i>
                    </div>
                </a>
            `).join('');

            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', renderFiles);
    </script>
</body>
</html>
