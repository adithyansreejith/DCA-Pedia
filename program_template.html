<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Resources | DCA-Pedia</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
</head>
<body class="program-page">
    <header>
        <div class="container">
            <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">
                <i data-lucide="folder-search" class="logo-icon"></i>
                <h1>DCA<span>Pedia</span></h1>
            </a>
            <div class="nav-actions">
                <a href="https://chat.whatsapp.com/LTJ6osev4OC1CukMr59Bec?mode=gi_t" target="_blank" class="whatsapp-link" title="Join WhatsApp Group">
                    <i data-lucide="message-circle"></i>
                </a>
                <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
                    <i data-lucide="moon" id="theme-icon"></i>
                </button>
                <a href="https://github.com" target="_blank" class="github-link">
                    <i data-lucide="github"></i>
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="page-header">
            <div class="container">
                <a href="index.html" class="back-link">
                    <i data-lucide="chevron-left"></i> Back to Programs
                </a>
                <h2 id="program-title">Loading...</h2>
                <p id="program-desc">Please wait while we fetch the resources.</p>
                
                <div class="search-container" style="margin-top: 1.5rem; text-align: left; max-width: 100%;">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="file-search" class="search-input" placeholder="Search files in this section...">
                </div>
            </div>
        </div>

        <div class="file-list-container">
            <div class="container">
                <div class="file-list" id="file-list">
                    <!-- Files will be injected here -->
                </div>
                <div id="no-files" style="display: none; text-align: center; padding: 3rem; color: var(--text-light);">
                    <i data-lucide="info" style="width: 48px; height: 48px; margin-bottom: 1rem;"></i>
                    <p>No PDFs found in this section yet.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 DCA-Pedia. Developed by <b>SFI DCA SUB COMMITTEE</b> <a href="https://www.instagram.com/sfi_dca_cusat/" target="_blank" rel="noopener noreferrer" style="color: var(--primary); margin-left: 5px; vertical-align: middle;"><i data-lucide="instagram" style="width: 18px; height: 18px;"></i></a>. All resources are for educational purposes.</p>
        </div>
    </footer>

    <script src="data/pdfs.js"></script>
    <script>
        let currentFiles = [];

        function isNew(dateStr) {
            const uploadDate = new Date(dateStr);
            const today = new Date();
            const diffTime = Math.abs(today - uploadDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays <= 7;
        }

        function updateThemeUI() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const themeIcon = document.getElementById('theme-icon');
            if (themeIcon) {
                themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
                if (window.lucide) lucide.createIcons();
            }
        }

        let clickCount = 0;
        let lastClickTime = 0;

        document.getElementById('theme-toggle').addEventListener('click', () => {
            if (document.body.classList.contains('disco-mode')) {
                document.body.classList.remove('disco-mode');
                clickCount = 0;
                return;
            }

            const now = Date.now();
            if (now - lastClickTime < 500) {
                clickCount++;
            } else {
                clickCount = 1;
            }
            lastClickTime = now;

            if (clickCount >= 5) {
                document.body.classList.add('disco-mode');
                clickCount = 0;
                return;
            }

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            
            if (newTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            
            localStorage.setItem('theme', newTheme);
            updateThemeUI();
        });

        function renderFiles(filter = '') {
            const fileList = document.getElementById('file-list');
            const filteredFiles = currentFiles.filter(file => 
                file.name.toLowerCase().includes(filter.toLowerCase())
            );

            if (filteredFiles.length === 0) {
                fileList.innerHTML = '';
                document.getElementById('no-files').style.display = 'block';
                document.getElementById('no-files').querySelector('p').textContent = filter ? `No matches found for "${filter}"` : 'No PDFs found in this section yet.';
                return;
            }

            document.getElementById('no-files').style.display = 'none';
            fileList.innerHTML = filteredFiles.map(file => `
                <a href="static/pdfs/${window.programFolder}/${file.name}" class="file-item" target="_blank">
                    <div class="file-icon">
                        <i data-lucide="file-text"></i>
                    </div>
                    <div class="file-info">
                        <span class="file-name">
                            ${file.name}
                            ${isNew(file.date) ? '<span class="badge-new">New</span>' : ''}
                        </span>
                        <span class="file-meta">${file.size} • Uploaded on ${file.date}</span>
                    </div>
                    <div class="download-icon">
                        <i data-lucide="download"></i>
                    </div>
                </a>
            `).join('');
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateThemeUI();
            
            const path = window.location.pathname;
            const filename = path.split('/').pop().replace('.html', '');
            const program = pdfData[filename];
            
            if (!program) {
                document.getElementById('program-title').textContent = "Error";
                document.getElementById('program-desc').textContent = "Program not found.";
                return;
            }

            document.getElementById('program-title').textContent = program.title;
            document.getElementById('program-desc').textContent = program.description;
            document.title = `${program.title} | DCA-Pedia`;
            window.programFolder = program.folder;
            currentFiles = program.files || [];

            renderFiles();

            document.getElementById('file-search').addEventListener('input', (e) => {
                renderFiles(e.target.value);
            });
        });
    </script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
